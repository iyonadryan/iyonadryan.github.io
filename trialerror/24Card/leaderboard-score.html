<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24Card - Leaderboard Score</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-leaderboard">
  <a href="index.html" class="btn-back-menu" title="Kembali ke menu">← Menu</a>

  <div class="container leaderboard-container">
    <header>
      <h1>🏆 Leaderboard Score</h1>
      <p class="subtitle">25 peringkat teratas</p>
    </header>

    <div class="lb-tabs">
      <button class="lb-tab active" data-mode="24">Mode 24</button>
      <button class="lb-tab" data-mode="36">Mode 36</button>
    </div>

    <div id="lbContent" class="lb-content">
      <table class="lb-table">
        <thead>
          <tr>
            <th class="col-rank">Rank</th>
            <th class="col-name">Nama</th>
            <th class="col-score">Score</th>
            <th class="col-time">Tanggal</th>
          </tr>
        </thead>
        <tbody id="lbBody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
