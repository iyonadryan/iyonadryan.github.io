<body>
  <div class="container" style="display:none;text-align:center" id="mainContent">
    <div id="lifeContainer" class="life-container"></div>

    <div id="roundTimer" class="round-timer" style="display:none"></div>

    <div id="cardsContainer" class="cards"></div>

    <div class="controls controls-battle">
      <button id="btnReset" class="btn btn-secondary" disabled>↺ Reset</button>
      <button id="btnShuffle" class="btn btn-secondary" disabled>🔀 Acak Posisi</button>

    <div id="infoArea" class="info">Pilih kartu untuk memulai</div>

    <div id="opsContainer" class="operations">
      <button class="op-btn" data-op="+">+</button>

      <button class="op-btn" data-op="×">×</button>
      <button class="op-btn" data-op="÷">÷</button>

    <div id="stepsContainer" class="steps">
      <div class="steps-title">📜 Langkah-langkah</div>
