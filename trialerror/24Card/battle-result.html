<body>
  <div class="container">
    <header>
      <h1>🏆 Hasil Battle</h1>
      <p class="subtitle">Room #<span id="resultRoomId" style="color:#ffd54f;font-weight:700"></span></p>
    </header>
    <div id="resultLoading" style="text-align:center;padding:60px 0">
      <p style="color:#fff">⏳ Memuat hasil...</p>
    </div>
    <div id="resultContent" style="display:none">
      <div class="podium" id="podiumContainer"></div>
      <div class="scoreboard result-table-parent" style="margin-top:10px">
        <table class="scoreboard-table result-table">
          <thead>
            <tr>
              <th class="col-rank">Rank</th>
              <th class="col-name">Name</th>
              <th class="col-life">Life</th>
              <th class="col-time">Last Round</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
      <div class="track-record" id="trackRecordContainer" style="margin-top:28px">
        <h2 class="track-record-title">Track Record</h2>
        <div class="track-record-scroll">
          <table class="track-record-table" id="trackRecordTable">
            <thead id="trackRecordHead"></thead>
            <tbody id="trackRecordBody"></tbody>
          </table>
        </div>
      </div>
      <div style="text-align:center;margin-top:28px">
        <a href="index.html" class="btn btn-challenge">← Kembali ke Menu</a>
      </div>
    </div>
  </div>
